name: cryptalk
description: Secret coded messaging app
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: ^2.24.2
  firebase_auth: ^4.16.0
  cloud_firestore: ^4.14.0
  google_sign_in: ^6.2.1

  # UI
  google_fonts: ^6.1.0
  flutter_animate: ^4.5.0
  lottie: ^3.0.0
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0

  # Utils
  uuid: ^4.3.3
  share_plus: ^7.2.1
  clipboard: ^0.1.3
  provider: ^6.1.1
  shared_preferences: ^2.2.2
  http: ^1.1.2

  # Optional AI
  dart_openai: ^4.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/animations/
